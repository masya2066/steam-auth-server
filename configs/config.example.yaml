listenAddr: ":8088"

# Shared secret for Admin API (accounts list/update/delete).
# Creating new accounts with mail credentials is done in shop admin.
adminToken: "change-me-admin"

# Shared secret for launcher token requests (temporary; replace with PlayGate JWT later).
launcherToken: "change-me-launcher"

otp:
  # Permanent service token for the OTP/email parser.
  # Request body: { "login": "<steam_login>" }
  baseURL: "https://playgate.store"
  requestPath: "/api/internal/steam-guard/request-by-login"
  bearerToken: ""
  initialDelaySec: 5
  pollIntervalSec: 3
  pollTimeoutSec: 90

steam:
  # Steam Web API key is NOT required for IAuthenticationService.
  userAgent: "PlayGateSteamTokenServer/0.1"

store:
  # Persistence via shop: /api/internal/steam-auth/*
  # Leave empty to reuse otp.baseURL and otp.bearerToken.
  baseURL: ""
  bearerToken: ""
